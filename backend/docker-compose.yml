# Docker Compose for Project Bluefin (Hybrid/Development)
services:
  app:
    # Use the base Swift image directly so it has the compiler (swift run)
    image: swift:6.0-noble
    working_dir: /app
    volumes:
      - .:/app
      # Use a volume for build artifacts to avoid slow syncing and macOS/Linux conflicts
      - build_cache:/app/.build
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: vapor_username
      DATABASE_PASSWORD: vapor_password
      DATABASE_DATABASE: vapor_database
      LOG_LEVEL: debug
    ports:
      - '8080:8080'
    depends_on:
      - db
    # Every time the container starts/restarts, it runs 'swift run'
    # which automatically recompiles if it detects changes.
    command: ["swift", "run", "backend", "serve", "--hostname", "0.0.0.0", "--port", "8080"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor_username
      POSTGRES_PASSWORD: vapor_password
      POSTGRES_DB: vapor_database
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  build_cache:
